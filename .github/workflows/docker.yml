# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "main"
        type: string

  # version tags on main branch
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_APP: ghcr.io/visualize-admin/electricity-prices-switzerland

jobs:
  push_to_registry:
    name: Push Docker image to Github Container registry
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create fake wiki content
        run: echo "[]" > src/domain/wiki/content.json

      - name: Install dependencies
        uses: ./.github/workflows/install-deps

      - name: Download locales
        run: pnpm locales:export
        env:
          ACCENT_API_KEY: ${{ secrets.ACCENT_API_KEY }}

      - name: Check for uncommitted locale changes
        run: |
          if ! git diff --exit-code then
            echo "Locales should be updated in the repository via pnpm locales:export"
            exit 1
          fi

        # Build app
      - name: Extract metadata (tags, labels) for Docker
        id: meta-app
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME_APP}}
          # Added type=sha to the default
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha

      - name: Log in to Github Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and export to Docker
        id: build-app
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME_APP }}:test
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME_APP }}:test
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          scanners: "vuln"
          severity: "CRITICAL,HIGH"

      - name: Build and Push Docker image to registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
