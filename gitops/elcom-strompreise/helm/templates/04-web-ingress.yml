apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.web.name }}-ingress
  labels: {{ include "elcom-strompreise.labels" . | nindent 4 }}
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.web.name }}
            port:
              name: {{ .Values.web.port.name }}