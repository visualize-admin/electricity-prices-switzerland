apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.traefik.name }}
  labels: {{ include "elcom-strompreise.labels" . | nindent 4 }}
    name: {{ .Values.traefik.name }}
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
    - name: "8080"
      port: 8080
      targetPort: 8080
  selector:
    name: {{ .Values.traefik.name }}
